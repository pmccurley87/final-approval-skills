<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#f7f6f2"/>
      <stop offset="100%" stop-color="#edecea"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <!-- Clip the card so the header stays inside rounded corners -->
    <clipPath id="card-clip">
      <rect x="0" y="0" width="580" height="560" rx="16"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Left side — brand + copy -->
  <g transform="translate(80, 140)">
    <!-- Logo -->
    <text font-family="'Bebas Neue', Impact, 'Arial Narrow Bold', sans-serif"
          font-size="52" fill="#26251e" letter-spacing="0.04em">
      FINAL</text>
    <g transform="translate(195, -6)">
      <rect x="0" y="-35" width="185" height="50" rx="4" fill="none" stroke="#f54e00" stroke-width="3"/>
      <text font-family="'Anton', Impact, sans-serif"
            font-size="46" fill="#f54e00" y="4" x="10" letter-spacing="0">APPROVAL</text>
    </g>

    <!-- Tagline -->
    <text y="70" font-family="'Inter', 'Geist', system-ui, sans-serif"
          font-size="28" font-weight="600" fill="#26251e" letter-spacing="-0.02em">
      Human-in-the-loop approvals</text>
    <text y="108" font-family="'Inter', 'Geist', system-ui, sans-serif"
          font-size="28" font-weight="600" fill="#26251e" letter-spacing="-0.02em">
      for AI agents</text>

    <!-- Subtitle -->
    <text y="165" font-family="'Inter', 'Geist', system-ui, sans-serif"
          font-size="17" fill="#26251e" opacity="0.55" letter-spacing="-0.005em">
      Before your agent does something irreversible,</text>
    <text y="190" font-family="'Inter', 'Geist', system-ui, sans-serif"
          font-size="17" fill="#26251e" opacity="0.55" letter-spacing="-0.005em">
      it asks. You approve from a dashboard.</text>

    <!-- Feature pills -->
    <g transform="translate(0, 240)">
      <rect x="0" y="0" width="140" height="34" rx="17" fill="#f54e00" opacity="0.08"/>
      <text x="70" y="22" text-anchor="middle"
            font-family="'Geist Mono', 'SF Mono', monospace" font-size="11.5"
            fill="#f54e00" letter-spacing="0.08em">MCP SERVER</text>

      <rect x="152" y="0" width="130" height="34" rx="17" fill="#f54e00" opacity="0.08"/>
      <text x="217" y="22" text-anchor="middle"
            font-family="'Geist Mono', 'SF Mono', monospace" font-size="11.5"
            fill="#f54e00" letter-spacing="0.08em">WEBHOOKS</text>

      <rect x="294" y="0" width="130" height="34" rx="17" fill="#f54e00" opacity="0.08"/>
      <text x="359" y="22" text-anchor="middle"
            font-family="'Geist Mono', 'SF Mono', monospace" font-size="11.5"
            fill="#f54e00" letter-spacing="0.08em">AUDIT LOG</text>
    </g>

    <!-- URL instead of npx -->
    <text y="340" font-family="'Inter', 'Geist', system-ui, sans-serif"
          font-size="15" fill="#f54e00" letter-spacing="-0.005em">
      finalapproval.ai</text>
  </g>

  <!-- Right side — approval card mockup -->
  <g transform="translate(620, 80)" filter="url(#shadow)">
    <!-- Card with clipping so header corners are clean -->
    <rect x="0" y="0" width="580" height="560" rx="16" fill="#ffffff"/>
    <g clip-path="url(#card-clip)">
      <!-- Card header — single rect, clipped to card radius -->
      <rect x="0" y="0" width="580" height="56" fill="#26251e"/>
      <!-- Dots -->
      <circle cx="24" cy="28" r="6" fill="#f54e00" opacity="0.7"/>
      <circle cx="44" cy="28" r="6" fill="#ffffff" opacity="0.2"/>
      <circle cx="64" cy="28" r="6" fill="#ffffff" opacity="0.2"/>
      <text x="290" y="33" text-anchor="middle"
            font-family="'Geist Mono', 'SF Mono', monospace" font-size="12"
            fill="#ffffff" opacity="0.5" letter-spacing="0.06em">PENDING APPROVAL</text>

      <!-- Approval title -->
      <g transform="translate(28, 80)">
        <circle cx="6" cy="10" r="5" fill="#f54e00"/>
        <text x="22" y="14"
              font-family="'Inter', 'Geist', system-ui, sans-serif"
              font-size="18" font-weight="600" fill="#26251e" letter-spacing="-0.01em">
          Send campaign to 12,400 subscribers</text>
        <text x="22" y="38"
              font-family="'Geist Mono', 'SF Mono', monospace" font-size="12"
              fill="#26251e" opacity="0.4" letter-spacing="0.04em">
          EMAIL-AGENT  ·  MARKETING CHANNEL</text>
      </g>

      <!-- Divider -->
      <line x1="28" y1="136" x2="552" y2="136" stroke="#26251e" stroke-opacity="0.08"/>

      <!-- Body preview — non-technical email campaign example -->
      <g transform="translate(28, 156)" font-family="'Inter', 'Geist', system-ui, sans-serif" font-size="14" fill="#26251e" opacity="0.7">
        <text y="0" font-weight="600" font-size="13" fill="#26251e" opacity="0.4"
              font-family="'Geist Mono', 'SF Mono', monospace" letter-spacing="0.06em">REQUEST BODY</text>
        <rect x="0" y="16" width="524" height="180" rx="8" fill="#f7f6f2"/>
        <text x="16" y="46" font-size="13.5" fill="#26251e" opacity="0.65">
          <tspan font-weight="600" fill="#26251e" opacity="0.85">Subject:</tspan> Your April product update</text>
        <text x="16" y="72" font-size="13.5" fill="#26251e" opacity="0.65">
          <tspan font-weight="600" fill="#26251e" opacity="0.85">Audience:</tspan> Active users, last 30 days</text>
        <text x="16" y="98" font-size="13.5" fill="#26251e" opacity="0.65">
          <tspan font-weight="600" fill="#26251e" opacity="0.85">Recipients:</tspan> 12,418</text>
        <text x="16" y="124" font-size="13.5" fill="#26251e" opacity="0.65">
          <tspan font-weight="600" fill="#26251e" opacity="0.85">Scheduled:</tspan> Tomorrow, 9:00 AM EST</text>
        <text x="16" y="150" font-size="13.5" fill="#26251e" opacity="0.65">
          <tspan font-weight="600" fill="#26251e" opacity="0.85">Estimated cost:</tspan> $18.60</text>
        <text x="16" y="180" font-size="12" fill="#26251e" opacity="0.35"
              font-family="'Geist Mono', 'SF Mono', monospace">
          Preview email attached</text>
      </g>

      <!-- Action buttons -->
      <g transform="translate(28, 420)">
        <rect x="0" y="0" width="256" height="48" rx="10" fill="#1f8a65"/>
        <text x="128" y="30" text-anchor="middle"
              font-family="'Inter', 'Geist', system-ui, sans-serif"
              font-size="15" font-weight="600" fill="#ffffff" letter-spacing="-0.01em">Approve</text>
        <rect x="268" y="0" width="256" height="48" rx="10" fill="none" stroke="#cf2d56" stroke-width="2"/>
        <text x="396" y="30" text-anchor="middle"
              font-family="'Inter', 'Geist', system-ui, sans-serif"
              font-size="15" font-weight="600" fill="#cf2d56" letter-spacing="-0.01em">Deny</text>
      </g>

      <!-- Webhook status -->
      <g transform="translate(28, 494)">
        <line x1="0" y1="0" x2="524" y2="0" stroke="#26251e" stroke-opacity="0.08"/>
        <circle cx="8" cy="28" r="4" fill="#1f8a65"/>
        <text x="20" y="33"
              font-family="'Geist Mono', 'SF Mono', monospace" font-size="12"
              fill="#26251e" opacity="0.45" letter-spacing="0.04em">
          WEBHOOK READY  ·  SENDS ON APPROVAL</text>
      </g>
    </g>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="712" width="1280" height="8" fill="#f54e00"/>
</svg>
