<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#26251e"/>
      <stop offset="100%" stop-color="#1a1914"/>
    </linearGradient>
    <linearGradient id="accent-fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f54e00" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f54e00" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" rx="16" fill="url(#bg)"/>

  <!-- Subtle diagonal accent -->
  <polygon points="0,400 0,200 600,0 800,0" fill="url(#accent-fade)"/>

  <!-- Left: Brand -->
  <g transform="translate(64, 80)">
    <!-- Logo mark -->
    <rect x="0" y="0" width="64" height="64" rx="12" fill="none" stroke="#f54e00" stroke-width="3"/>
    <text x="32" y="44" text-anchor="middle"
          font-family="Impact, 'Arial Narrow Bold', sans-serif"
          font-size="36" font-weight="700" letter-spacing="0.04em" fill="#f54e00">FA</text>
    <circle cx="56" cy="8" r="12" fill="#f54e00"/>
    <polyline points="50,8 54,12 63,4" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Title -->
    <text x="82" y="26" font-family="Impact, 'Arial Narrow Bold', sans-serif"
          font-size="30" fill="#ffffff" letter-spacing="0.06em">FINAL</text>
    <g transform="translate(170, 0)">
      <rect x="0" y="-2" width="180" height="40" rx="4" fill="none" stroke="#f54e00" stroke-width="2.5"/>
      <text x="12" y="28" font-family="Impact, 'Arial Narrow Bold', sans-serif"
            font-size="28" fill="#f54e00" letter-spacing="0.04em">APPROVAL</text>
    </g>

    <!-- Tagline -->
    <text y="90" font-family="system-ui, -apple-system, sans-serif"
          font-size="28" font-weight="700" fill="#ffffff" letter-spacing="-0.02em">
      Human-in-the-loop approvals</text>
    <text y="126" font-family="system-ui, -apple-system, sans-serif"
          font-size="28" font-weight="700" fill="#ffffff" letter-spacing="-0.02em">
      for AI agents</text>

    <!-- Subtitle -->
    <text y="172" font-family="system-ui, -apple-system, sans-serif"
          font-size="16" fill="#ffffff" opacity="0.5" letter-spacing="-0.005em">
      Your agent asks before it acts. You approve from a dashboard.</text>
    <text y="196" font-family="system-ui, -apple-system, sans-serif"
          font-size="16" fill="#ffffff" opacity="0.5" letter-spacing="-0.005em">
      The webhook fires. The action runs.</text>

    <!-- Feature pills -->
    <g transform="translate(0, 226)">
      <rect x="0" y="0" width="120" height="30" rx="15" fill="#f54e00" opacity="0.15"/>
      <text x="60" y="20" text-anchor="middle"
            font-family="monospace" font-size="11"
            fill="#f54e00" letter-spacing="0.06em">CLAUDE CODE</text>

      <rect x="132" y="0" width="90" height="30" rx="15" fill="#f54e00" opacity="0.15"/>
      <text x="177" y="20" text-anchor="middle"
            font-family="monospace" font-size="11"
            fill="#f54e00" letter-spacing="0.06em">CURSOR</text>

      <rect x="234" y="0" width="110" height="30" rx="15" fill="#f54e00" opacity="0.15"/>
      <text x="289" y="20" text-anchor="middle"
            font-family="monospace" font-size="11"
            fill="#f54e00" letter-spacing="0.06em">WINDSURF</text>

      <rect x="356" y="0" width="85" height="30" rx="15" fill="#f54e00" opacity="0.15"/>
      <text x="398" y="20" text-anchor="middle"
            font-family="monospace" font-size="11"
            fill="#f54e00" letter-spacing="0.06em">CODEX</text>
    </g>
  </g>

  <!-- Right: Mini approval card mockup -->
  <g transform="translate(720, 50)">
    <rect x="0" y="0" width="420" height="300" rx="12" fill="#ffffff" opacity="0.07"/>
    <rect x="0" y="0" width="420" height="42" rx="12" fill="#ffffff" opacity="0.05"/>
    <!-- Fake top corners fix -->
    <rect x="0" y="24" width="420" height="18" fill="#ffffff" opacity="0.05"/>

    <!-- Header dots -->
    <circle cx="20" cy="21" r="5" fill="#f54e00" opacity="0.6"/>
    <circle cx="38" cy="21" r="5" fill="#ffffff" opacity="0.15"/>
    <circle cx="56" cy="21" r="5" fill="#ffffff" opacity="0.15"/>
    <text x="210" y="26" text-anchor="middle"
          font-family="monospace" font-size="10"
          fill="#ffffff" opacity="0.3" letter-spacing="0.06em">PENDING APPROVAL</text>

    <!-- Approval title -->
    <circle cx="26" cy="70" r="4" fill="#f54e00"/>
    <text x="40" y="74"
          font-family="system-ui, -apple-system, sans-serif"
          font-size="14" font-weight="600" fill="#ffffff" opacity="0.85">
      Deploy v2.4.1 to production</text>
    <text x="40" y="94"
          font-family="monospace" font-size="10"
          fill="#ffffff" opacity="0.3" letter-spacing="0.04em">
      DEPLOY-AGENT  ·  INFRA CHANNEL</text>

    <!-- Divider -->
    <line x1="20" y1="112" x2="400" y2="112" stroke="#ffffff" stroke-opacity="0.08"/>

    <!-- Body fields -->
    <rect x="20" y="124" width="380" height="120" rx="6" fill="#ffffff" opacity="0.04"/>
    <text x="36" y="150" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff" opacity="0.5">
      <tspan font-weight="600" fill="#ffffff" opacity="0.7">Service:</tspan> api-gateway</text>
    <text x="36" y="172" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff" opacity="0.5">
      <tspan font-weight="600" fill="#ffffff" opacity="0.7">Commit:</tspan> a3f2c91</text>
    <text x="36" y="194" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff" opacity="0.5">
      <tspan font-weight="600" fill="#ffffff" opacity="0.7">Changes:</tspan> 3 files, +42 -18</text>
    <text x="36" y="216" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff" opacity="0.5">
      <tspan font-weight="600" fill="#ffffff" opacity="0.7">Tests:</tspan> 147/147 passing</text>

    <!-- Buttons -->
    <rect x="20" y="258" width="185" height="32" rx="8" fill="#1f8a65"/>
    <text x="112" y="279" text-anchor="middle"
          font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff">
      Approve</text>
    <rect x="215" y="258" width="185" height="32" rx="8" fill="none" stroke="#cf2d56" stroke-width="1.5"/>
    <text x="307" y="279" text-anchor="middle"
          font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#cf2d56">
      Deny</text>
  </g>

  <!-- Bottom accent -->
  <rect x="0" y="392" width="1200" height="8" fill="#f54e00"/>
</svg>
